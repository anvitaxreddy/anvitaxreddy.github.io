<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<style>
/*──────────────────────────────────────────
  RESET & TOKENS
──────────────────────────────────────────*/
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:    #080810;
  --fg:    #f2f0eb;
  --dim:   rgba(242,240,235,.45);
  --fire:  #e8490f;
  --ice:   #1cf0c0;
  --gold:  #f0c040;
  --plum:  #9b5de5;
  --glass: rgba(242,240,235,.04);
  --gbrd:  rgba(242,240,235,.09);
  --serif: 'DM Serif Display', serif;
  --mono:  'Martian Mono', monospace;
  --disp:  'Bebas Neue', sans-serif;
}
html { font-size:16px; scroll-behavior:auto; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--mono);
  overflow-x: hidden;
  cursor: none;
}

/*──────────────────────────────────────────
  CURSOR
──────────────────────────────────────────*/
#CUR { position:fixed; top:0; left:0; pointer-events:none; z-index:9999; mix-blend-mode:exclusion; }
#CUR circle { fill:var(--fg); transition:r .25s cubic-bezier(.16,1,.3,1); }

/*──────────────────────────────────────────
  NOISE OVERLAY
──────────────────────────────────────────*/
#noise {
  position:fixed; inset:0; pointer-events:none; z-index:1;
  opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px;
  animation:grain .08s steps(1) infinite;
}
@keyframes grain {
  0%{transform:translate(0,0)}  10%{transform:translate(-2%,-3%)}
  20%{transform:translate(3%,2%)} 30%{transform:translate(-1%,4%)}
  40%{transform:translate(4%,-1%)} 50%{transform:translate(-3%,3%)}
  60%{transform:translate(2%,-4%)} 70%{transform:translate(-4%,1%)}
  80%{transform:translate(3%,-2%)} 90%{transform:translate(-2%,4%)}
  100%{transform:translate(1%,-3%)}
}

/*──────────────────────────────────────────
  PROGRESS LINE
──────────────────────────────────────────*/
#pline {
  position:fixed; top:0; left:0; height:2px; width:0;
  background:linear-gradient(90deg,var(--fire),var(--gold),var(--ice));
  z-index:1000; transition:width .08s linear;
}

/*──────────────────────────────────────────
  STATIC NAV
──────────────────────────────────────────*/
nav {
  position:fixed; top:0; left:0; right:0; z-index:500;
  display:flex; justify-content:space-between; align-items:center;
  padding:1.2rem 2.5rem;
  background:linear-gradient(to bottom,rgba(8,8,16,.96),transparent);
  pointer-events:none;
}
.nav-name {
  font-family:var(--disp); font-size:1.5rem; letter-spacing:.08em;
  color:var(--fg); line-height:1;
}
.nav-title {
  font-family:var(--mono); font-size:.52rem; letter-spacing:.28em;
  color:var(--dim); text-transform:uppercase;
}
.nav-right {
  display:flex; gap:1.6rem; pointer-events:all;
}
.nav-right a {
  font-family:var(--mono); font-size:.5rem; letter-spacing:.2em;
  color:var(--dim); text-decoration:none; text-transform:uppercase;
  transition:color .25s; cursor:none;
}
.nav-right a:hover { color:var(--fg); }

/*──────────────────────────────────────────
  SCROLL TRACK (long page = scroll distance)
──────────────────────────────────────────*/
#track { height:700vh; position:relative; }

/*──────────────────────────────────────────
  PINNED STAGE
──────────────────────────────────────────*/
#stage {
  position:sticky; top:0; height:100vh; width:100vw;
  overflow:hidden; display:flex; flex-direction:column;
}

/*──────────────────────────────────────────
  FILM STRIP CONTAINER
  Horizontal tape that slides left on scroll
──────────────────────────────────────────*/
#tape-wrap {
  flex:1; position:relative; overflow:hidden;
  display:flex; align-items:center;
}
#tape {
  display:flex; align-items:stretch; gap:0;
  height:100%; will-change:transform;
  /* start offset so first frame is centered */
}

/*──────────────────────────────────────────
  SPROCKET HOLES (film border top & bottom)
──────────────────────────────────────────*/
.sprocket {
  position:absolute; left:0; right:0; height:28px;
  background:var(--bg);
  display:flex; align-items:center; gap:18px;
  padding:0 10px; z-index:10; pointer-events:none;
}
.sprocket.top { top:0; border-bottom:1px solid rgba(242,240,235,.08); }
.sprocket.bot { bottom:0; border-top:1px solid rgba(242,240,235,.08); }
.hole {
  width:16px; height:12px; border-radius:2px;
  border:1px solid rgba(242,240,235,.18);
  background:rgba(0,0,0,.6); flex-shrink:0;
}

/*──────────────────────────────────────────
  FRAME COUNTER (top right)
──────────────────────────────────────────*/
#frame-counter {
  position:absolute; top:36px; right:2rem; z-index:20;
  font-family:var(--mono); font-size:.5rem; letter-spacing:.2em;
  color:rgba(242,240,235,.3); pointer-events:none;
}
#frame-num { color:var(--fire); font-size:.7rem; font-weight:700; }

/*──────────────────────────────────────────
  SECTION LABEL (bottom left, updates)
──────────────────────────────────────────*/
#section-label {
  position:absolute; bottom:36px; left:2.5rem; z-index:20;
  pointer-events:none;
}
.sl-num { font-family:var(--mono); font-size:.5rem; letter-spacing:.2em; color:var(--fire); margin-bottom:.3rem; }
.sl-name { font-family:var(--disp); font-size:clamp(2rem,5vw,3.5rem); letter-spacing:.06em; color:var(--fg); line-height:1; }
.sl-sub { font-family:var(--mono); font-size:.48rem; letter-spacing:.18em; color:var(--dim); margin-top:.4rem; }

/*──────────────────────────────────────────
  EXPAND HINT
──────────────────────────────────────────*/
#expand-hint {
  position:absolute; bottom:38px; right:2rem; z-index:20;
  font-family:var(--mono); font-size:.48rem; letter-spacing:.18em;
  color:var(--dim); pointer-events:none;
  opacity:0; transition:opacity .4s;
  display:flex; align-items:center; gap:.5rem;
}
#expand-hint.show { opacity:1; }
.eh-box {
  width:20px; height:20px; border:1px solid var(--fire);
  display:flex; align-items:center; justify-content:center;
  font-size:.65rem; color:var(--fire);
  animation:eh-pulse 1.4s ease-in-out infinite;
}
@keyframes eh-pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/*──────────────────────────────────────────
  INDIVIDUAL FRAMES
──────────────────────────────────────────*/
.frame {
  flex-shrink:0;
  height:100%;
  position:relative;
  cursor:none;
  border-right:1px solid rgba(242,240,235,.06);
  transition:filter .4s;
  overflow:hidden;
  /* width set by JS */
}
.frame:hover { filter:brightness(1.08); }
.frame-canvas {
  position:absolute; inset:0;
  display:block; width:100%; height:100%;
}
/* frame edge vignette */
.frame::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 90% 90% at 50% 50%, transparent 60%, rgba(8,8,16,.55) 100%);
}
/* frame index label */
.f-idx {
  position:absolute; top:36px; left:1rem;
  font-family:var(--mono); font-size:.42rem; letter-spacing:.2em;
  color:rgba(242,240,235,.2); pointer-events:none; z-index:5;
}

/*──────────────────────────────────────────
  EXPAND OVERLAY
──────────────────────────────────────────*/
#expand {
  position:fixed; inset:0; z-index:800;
  background:rgba(8,8,16,.0);
  display:flex; align-items:stretch;
  pointer-events:none; opacity:0;
  transition:opacity .5s, background .5s;
}
#expand.open {
  opacity:1; pointer-events:all;
  background:rgba(8,8,16,.97);
}
#expand-canvas-wrap {
  flex:0 0 45%; position:relative;
  border-right:1px solid var(--gbrd);
}
#expand-canvas { width:100%; height:100%; display:block; }
#expand-content {
  flex:1; overflow-y:auto; padding:5rem 3.5rem 5rem 4rem;
  transform:translateX(40px); opacity:0;
  transition:transform .6s cubic-bezier(.16,1,.3,1) .15s, opacity .6s .15s;
}
#expand.open #expand-content { transform:translateX(0); opacity:1; }
#expand-content::-webkit-scrollbar { width:3px; }
#expand-content::-webkit-scrollbar-thumb { background:var(--gbrd); }
.ec-label { font-family:var(--mono); font-size:.5rem; letter-spacing:.3em; color:var(--fire); margin-bottom:.8rem; }
.ec-title {
  font-family:var(--serif); font-size:clamp(2rem,4vw,3rem); font-style:italic;
  color:var(--fg); line-height:1.05; margin-bottom:2rem;
}
.ec-body { font-family:var(--mono); font-size:.72rem; line-height:1.95; color:var(--dim); }
.ec-body strong { color:var(--fg); font-weight:700; }
.ec-body .block { margin-bottom:2rem; padding-bottom:2rem; border-bottom:1px solid var(--gbrd); }
.ec-body .block:last-child { border-bottom:none; }
.ec-body .b-role { font-family:var(--disp); font-size:1.3rem; letter-spacing:.06em; color:var(--fg); margin-bottom:.3rem; }
.ec-body .b-co { font-family:var(--mono); font-size:.6rem; letter-spacing:.18em; color:var(--fire); margin-bottom:.3rem; }
.ec-body .b-date { font-size:.5rem; letter-spacing:.15em; color:rgba(242,240,235,.25); margin-bottom:.9rem; }
.ec-body ul { list-style:none; }
.ec-body li { padding:.35rem 0 .35rem 1.3rem; position:relative; }
.ec-body li::before { content:'→'; position:absolute; left:0; color:var(--ice); font-size:.65rem; }
.ec-body .metric {
  display:inline-block; margin:.3rem .3rem 0 0;
  padding:.25rem .7rem; border:1px solid rgba(240,192,64,.35);
  color:var(--gold); font-size:.55rem; letter-spacing:.1em;
}
.ec-body .tag {
  display:inline-block; margin:.25rem .25rem 0 0;
  padding:.2rem .55rem; border:1px solid var(--gbrd);
  color:var(--dim); font-size:.52rem; letter-spacing:.08em;
}
.ec-body .tag.hi { border-color:rgba(28,240,192,.3); color:var(--ice); }
.ec-body a { color:var(--ice); text-decoration:none; }
.ec-body a:hover { color:var(--fg); }
.ec-body .live {
  display:inline-flex; align-items:center; gap:.5rem;
  margin-top:.7rem; padding:.5rem 1.2rem;
  background:rgba(232,73,15,.1); border:1px solid rgba(232,73,15,.45);
  color:var(--fire); font-size:.55rem; letter-spacing:.15em; text-decoration:none; transition:all .25s;
}
.ec-body .live:hover { background:rgba(232,73,15,.22); }
.live-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; animation:lp 1.3s infinite; flex-shrink:0; }
@keyframes lp { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
#close-btn {
  position:absolute; top:2rem; right:2rem; z-index:810;
  font-family:var(--mono); font-size:.55rem; letter-spacing:.15em;
  color:var(--dim); cursor:none; padding:.5rem .8rem;
  border:1px solid var(--gbrd); background:transparent;
  transition:all .25s;
}
#close-btn:hover { color:var(--fg); border-color:var(--fire); }

/*──────────────────────────────────────────
  SCROLL HINT
──────────────────────────────────────────*/
#shint {
  position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
  z-index:200; text-align:center; pointer-events:none;
  opacity:1; transition:opacity .8s;
}
#shint.gone { opacity:0; }
.sh-line { width:1px; height:44px; background:linear-gradient(to bottom,var(--fire),transparent); margin:0 auto .5rem; animation:sh 2s ease-in-out infinite; }
@keyframes sh { 0%{transform:scaleY(0);transform-origin:top} 50%{transform:scaleY(1);transform-origin:top} 51%{transform-origin:bottom} 100%{transform:scaleY(0);transform-origin:bottom} }
.sh-txt { font-family:var(--mono); font-size:.44rem; letter-spacing:.25em; color:rgba(242,240,235,.2); }

/*──────────────────────────────────────────
  LOADING
──────────────────────────────────────────*/
#loader {
  position:fixed; inset:0; z-index:9000;
  background:var(--bg); display:flex;
  flex-direction:column; align-items:center; justify-content:center; gap:1.2rem;
  transition:opacity .7s;
}
#loader.out { opacity:0; pointer-events:none; }
.ld-logo { font-family:var(--disp); font-size:3rem; letter-spacing:.1em; color:var(--fg); }
.ld-bar { width:200px; height:1px; background:rgba(242,240,235,.1); }
.ld-fill { height:100%; width:0; background:var(--fire); transition:width .2s; }
.ld-txt { font-family:var(--mono); font-size:.48rem; letter-spacing:.25em; color:var(--dim); }

</style>
</head>

/* ── helpers ── */
function cls(ctx,w,h,bg){ ctx.fillStyle=bg||'#080810'; ctx.fillRect(0,0,w,h); }
function hsl(h,s,l,a=1){ return `hsla(${h},${s},${l}%,${a})`; }

/* 0 – INTRO : big name + data streams */
function drawIntro(ctx,w,h,t){
  cls(ctx,w,h);
  // background grid
  ctx.strokeStyle='rgba(242,240,235,.03)';
  ctx.lineWidth=1;
  const gs=60;
  for(let x=0;x<w;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  for(let y=0;y<h;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  // scan line
  const sy=(t*.4%h);
  ctx.fillStyle='rgba(232,73,15,.06)';
  ctx.fillRect(0,sy,w,2);
  // data columns (matrix-ish)
  const cols=Math.floor(w/28);
  ctx.font=`bold ${Math.floor(w*.022)}px Martian Mono,monospace`;
  for(let c=0;c<cols;c++){
    const x=c*28+14;
    const phase=c*.7+t*.002;
    const visible=Math.sin(phase)>.3;
    if(!visible) continue;
    const chars='AIMLGENRAGLANGRAPHNEUROCACHESTATVISORPANDEMLANGCHAIN'.split('');
    const idx=Math.floor((t*.05+c*3.7)%chars.length);
    const alpha=Math.sin(phase)*.4+.1;
    ctx.fillStyle=`rgba(28,240,192,${alpha})`;
    ctx.fillText(chars[idx], x, ((t*0.8+c*h*.4)%h));
  }
  // central text
  const cx=w/2, cy=h/2;
  ctx.textAlign='center';
  ctx.font=`bold ${Math.floor(w*.11)}px Bebas Neue,sans-serif`;
  ctx.fillStyle='rgba(242,240,235,.08)';
  ctx.fillText('ANVITA',cx,cy+Math.floor(w*.06));
  // glowing line
  const grd=ctx.createLinearGradient(0,cy,w,cy);
  grd.addColorStop(0,'transparent');
  grd.addColorStop(.3,hsl(15,'90%','60%',.6));
  grd.addColorStop(.7,hsl(180,'90%','60%',.6));
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd; ctx.fillRect(0,cy-1,w,2);
  ctx.textAlign='left';
}

  rg.addColorStop(0,`rgba(28,240,192,${pulse*.4})`);
  rg.addColorStop(1,'transparent');

  ctx.fillStyle='rgba(28,240,192,.6)';
  ctx.fillText('AI ENGINEER', cx, cy+30);
  ctx.textAlign='left';
}

/* 2 – P&G : data flow / pipeline */
function drawPG(ctx,w,h,t){
  cls(ctx,w,h,'#0a060a');
  const stages=['RAW DATA','FAISS\nINDEX','LangGraph\nAGENTS','GPT-4\nINFERENCE','StatVisor\nOUTPUT'];
  const N=stages.length;
  const pad=w*.08;
  const sw=(w-pad*2)/(N-1);
  const cy=h/2;
  // animated pipeline
  stages.forEach((s,i)=>{
    const x=pad+i*sw;
    // box
    const bw=Math.floor(w*.13), bh=Math.floor(h*.18);
    const bx=x-bw/2, by=cy-bh/2;
    const alpha=.15+Math.sin(t*.04+i*.7)*.08;
    ctx.fillStyle=`rgba(232,73,15,${alpha})`;
    ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle=`rgba(232,73,15,${alpha*3})`;
    ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
    // label
    ctx.font=`${Math.floor(w*.018)}px Martian Mono,monospace`;
    ctx.textAlign='center'; ctx.fillStyle='rgba(242,240,235,.8)';
    s.split('\n').forEach((line,li)=>{
      ctx.fillText(line, x, cy-10+li*Math.floor(h*.04));
    });
    // animated connector
    if(i<N-1){
      const nx=pad+(i+1)*sw;
      const progress=(t*.03+i*.4)%1;
      const px=x+bw/2+(nx-bw/2-x-bw/2)*progress;
      ctx.beginPath(); ctx.moveTo(x+bw/2,cy); ctx.lineTo(nx-bw/2,cy);
      ctx.strokeStyle='rgba(242,240,235,.06)'; ctx.lineWidth=1; ctx.stroke();
      // moving dot
      ctx.beginPath(); ctx.arc(px,cy,4,0,Math.PI*2);
      ctx.fillStyle='rgba(232,73,15,.9)'; ctx.fill();
    }
  });
  ctx.textAlign='left';
  // metrics floating
  const metrics=[
    {txt:'70% FASTER',x:.05,y:.15},
    {txt:'3,000+ PAGES',x:.75,y:.2},
    {txt:'95%+ ACCURACY',x:.12,y:.82},
    {txt:'<1s LATENCY',x:.68,y:.85},
    {txt:'15+ API METRICS',x:.05,y:.5},
  ];
  metrics.forEach(m=>{
    const alpha=.25+Math.sin(t*.03+m.x*10)*.15;
    ctx.font=`${Math.floor(w*.015)}px Martian Mono,monospace`;
    ctx.fillStyle=`rgba(240,192,64,${alpha})`;
    ctx.fillText(m.txt, w*m.x, h*m.y);
  });
}

/* 3 – AnalyticsQuad4 : scraping web visualization */
function drawAQ(ctx,w,h,t){
  cls(ctx,w,h,'#060a10');
  // web graph nodes (scraped sites)
  const nodeCount=22;
  if(!drawAQ._nodes){
    drawAQ._nodes=Array.from({length:nodeCount},(_,i)=>({
      x:.1+Math.random()*.8, y:.1+Math.random()*.8,
      vx:(Math.random()-.5)*.0004, vy:(Math.random()-.5)*.0004,
    }));
  }
  const nodes=drawAQ._nodes;
  nodes.forEach(n=>{ n.x+=n.vx; n.y+=n.vy; if(n.x<.05||n.x>.95)n.vx*=-1; if(n.y<.05||n.y>.95)n.vy*=-1; });
  // edges
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      const dx=(nodes[i].x-nodes[j].x)*w, dy=(nodes[i].y-nodes[j].y)*h;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<w*.22){
        ctx.strokeStyle=`rgba(28,192,240,${.04*(1-d/(w*.22))})`;
        ctx.lineWidth=.7;
        ctx.beginPath();
        ctx.moveTo(nodes[i].x*w,nodes[i].y*h);
        ctx.lineTo(nodes[j].x*w,nodes[j].y*h);
        ctx.stroke();
      }
    }
  }
  // nodes
  nodes.forEach((n,i)=>{
    const pulse=Math.sin(t*.05+i*.8)*.5+.5;
    ctx.beginPath(); ctx.arc(n.x*w,n.y*h,3+pulse*2,0,Math.PI*2);
    ctx.fillStyle=i===0?'rgba(240,192,64,.9)':`rgba(28,192,240,${.4+pulse*.4})`;
    ctx.fill();
  });
  // counter
  const count=Math.floor(((t*.5)%11000)+1);
  ctx.font=`bold ${Math.floor(w*.08)}px Bebas Neue,sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='rgba(240,192,64,.18)';
  ctx.fillText(`${count.toLocaleString()}+ SITES`, w/2, h*.55);
  ctx.font=`${Math.floor(w*.018)}px Martian Mono,monospace`;
  ctx.fillStyle='rgba(28,192,240,.5)';
  ctx.fillText('SCRAPED & PROCESSED', w/2, h*.65);
  ctx.textAlign='left';
}

    {name:'GENAI',skills:['LangGraph','RAG','FAISS','MCP','Fine-Tuning'],color:'180,90%,55%'},

    {angle:Math.PI*.25, r:.28},

    {angle:Math.PI*1.25,r:.28},

    grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(nx,ny,R*.5,0,Math.PI*2); ctx.fill();
    ctx.font=`bold ${Math.floor(w*.022)}px Bebas Neue,sans-serif`;
    ctx.textAlign='center'; ctx.fillStyle=`hsla(${cat.color},.9)`;
    ctx.fillText(cat.name,nx,ny-R*.12);
    ctx.font=`${Math.floor(w*.014)}px Martian Mono,monospace`;
    cat.skills.forEach((s,si)=>{
      ctx.fillStyle=`hsla(${cat.color},.5)`;
      ctx.fillText(s,nx,ny+si*Math.floor(h*.045)-R*.05);
    });
  });
  // center
  ctx.textAlign='center';
  ctx.font=`bold ${Math.floor(w*.035)}px Bebas Neue,sans-serif`;
  ctx.fillStyle='rgba(242,240,235,.12)';
  ctx.fillText('FULL STACK AI',cx,cy+10);
  ctx.textAlign='left';
}

/* 6 – CERTS : golden badges */
function drawCerts(ctx,w,h,t){
  cls(ctx,w,h,'#0a0800');
  const certs=[
    'ANTHROPIC','AWS','NVIDIA','DATABRICKS','IBM','SNOWFLAKE'
  ];
  const cols=3, rows=2;
  const cw=w/cols, ch=h/rows;
  certs.forEach((c,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const cx=col*cw+cw/2, cy=row*ch+ch/2;
    const pulse=Math.sin(t*.04+i*.9)*.5+.5;
    // hexagon
    ctx.beginPath();
    for(let p=0;p<6;p++){
      const angle=p*Math.PI/3-Math.PI/6;
      const r=Math.min(cw,ch)*.32;
      const px=cx+Math.cos(angle)*r, py=cy+Math.sin(angle)*r;
      p===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.strokeStyle=`rgba(240,192,64,${.25+pulse*.15})`; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=`rgba(240,192,64,${.04+pulse*.03})`; ctx.fill();
    // star
    ctx.font=`${Math.floor(Math.min(cw,ch)*.16)}px serif`;
    ctx.textAlign='center'; ctx.fillStyle=`rgba(240,192,64,${.6+pulse*.3})`;
    ctx.fillText('★',cx,cy+Math.floor(Math.min(cw,ch)*.05));
    // name
    ctx.font=`${Math.floor(w*.018)}px Martian Mono,monospace`;
    ctx.fillStyle=`rgba(242,240,235,${.5+pulse*.3})`;
    ctx.fillText(c,cx,cy+Math.floor(Math.min(cw,ch)*.2));
    ctx.textAlign='left';
  });
  // "2025"
  ctx.font=`bold ${Math.floor(w*.12)}px Bebas Neue,sans-serif`;
  ctx.textAlign='center'; ctx.fillStyle='rgba(240,192,64,.04)';
  ctx.fillText('2025',w/2,h*.55);
  ctx.textAlign='left';
}

/*═══════════════════════════════════════════════════
  BUILD DOM & CANVASES
═══════════════════════════════════════════════════*/
const tape     = document.getElementById('tape');
const FW       = Math.min(window.innerWidth*.75, 900); // frame width
const FH       = window.innerHeight;
const TOTAL    = FRAMES.length;
document.getElementById('frame-tot').textContent = String(TOTAL).padStart(3,'0');

// Sprocket holes
function buildSprockets(){
  ['spr-top','spr-bot'].forEach(id=>{
    const sp=document.getElementById(id);
    const count=Math.ceil(window.innerWidth*TOTAL/16)+10;
    for(let i=0;i<count;i++){
      const h=document.createElement('div');
      h.className='hole'; sp.appendChild(h);
    }
  });
}
buildSprockets();

FRAMES.forEach((fr,i)=>{
  const frame = document.createElement('div');
  frame.className='frame';
  frame.style.width=FW+'px';
  frame.dataset.index=i;

  const cv=document.createElement('canvas');
  cv.className='frame-canvas';
  cv.width=FW; cv.height=FH;
  frame.appendChild(cv);

  const idx=document.createElement('div');
  idx.className='f-idx';
  idx.textContent=String(i+1).padStart(3,'0');
  frame.appendChild(idx);

  tape.appendChild(frame);
  canvases.push({el:cv, ctx:cv.getContext('2d'), fn:fr.draw, t:0, active:false});

  // click to expand
  frame.addEventListener('click',()=>{
    if(fr.expand) openExpand(i);
  });
  frame.style.cursor = fr.expand ? 'none' : 'default';
});

// First frame offset so it starts centered
tape.style.paddingLeft = ((window.innerWidth - FW)/2) + 'px';
tape.style.paddingRight= ((window.innerWidth - FW)/2) + 'px';

/*═══════════════════════════════════════════════════
  SCROLL → HORIZONTAL TAPE ANIMATION
═══════════════════════════════════════════════════*/
const sectionInfo=[
  {num:'00 — INTRO',    name:'ANVITA',          sub:'AI Engineer · GenAI Architect'},
  {num:'01 — IDENTITY', name:'ABOUT ME',         sub:'Engineer · Researcher · Builder'},
  {num:'02 — WORK',     name:'P&G',              sub:'Software Developer / AI-ML Researcher'},
  {num:'03 — WORK',     name:'ANALYTICSQUAD4',   sub:'Software Engineer · May 2023 – Jul 2024'},
  {num:'04 — PROJECTS', name:'BUILT',            sub:'Mockview · NeuroCache · More'},
  {num:'05 — SKILLS',   name:'ARSENAL',          sub:'Languages · GenAI · Cloud · ML · DevOps'},
  {num:'06 — CREDS',    name:'CERTIFIED',        sub:'6 Professional Certifications · 2025'},
];

let currentFrame = 0;
function onFrameChange(idx){
  if(idx===currentFrame) return;
  currentFrame=idx;
  const s=sectionInfo[idx]||sectionInfo[0];
  document.getElementById('sl-num').textContent=s.num;
  document.getElementById('sl-name').textContent=s.name;
  document.getElementById('sl-sub').textContent=s.sub;
  document.getElementById('frame-num').textContent=String(idx+1).padStart(3,'0');
  const hasExpand=!!FRAMES[idx]?.expand;
  document.getElementById('expand-hint').classList.toggle('show',hasExpand);
}

// GSAP: total tape travel = (N-1) * FW
const totalTravel = (TOTAL-1)*FW;

ScrollTrigger.create({
  trigger:'#track',
  start:'top top',
  end:'bottom bottom',
  scrub:1.2,
  onUpdate(self){
    // move tape horizontally
    const x = -self.progress * totalTravel;
    gsap.set('#tape', {x});

    // progress bar
    document.getElementById('pline').style.width=(self.progress*100)+'%';

    // which frame is centered?
    const idx=Math.round(self.progress*(TOTAL-1));
    onFrameChange(Math.max(0,Math.min(TOTAL-1,idx)));

    // scroll hint
    if(self.progress>.015) document.getElementById('shint').classList.add('gone');
    else document.getElementById('shint').classList.remove('gone');
  }
});

/*═══════════════════════════════════════════════════
  CANVAS ANIMATION LOOP
═══════════════════════════════════════════════════*/
function animLoop(){
  canvases.forEach((c,i)=>{
    // only animate frames near current view (performance)
    if(Math.abs(i-currentFrame)<=2){
      c.t++;
      c.fn(c.ctx, c.el.width, c.el.height, c.t);
    }
  });
  // expand canvas
  if(expandDrawFn && document.getElementById('expand').classList.contains('open')){
    expandT++;
    const ew=expandCanvas.width, eh=expandCanvas.height;
    expandDrawFn(ecx,ew,eh,expandT);
  }
  requestAnimationFrame(animLoop);
}
animLoop();

/*═══════════════════════════════════════════════════
  EXPAND / CLOSE
═══════════════════════════════════════════════════*/
let expandOpen=false;
function openExpand(i){
  const fr=FRAMES[i];
  if(!fr.expand) return;
  expandOpen=true;
  document.getElementById('ec-label').textContent=fr.expand.label;
  document.getElementById('ec-title').textContent=fr.expand.title;
  document.getElementById('ec-body').innerHTML=fr.expand.html;
  // resize expand canvas
  expandCanvas.width=expandCanvas.offsetWidth||window.innerWidth*.45;
  expandCanvas.height=expandCanvas.offsetHeight||window.innerHeight;
  expandDrawFn=fr.draw; expandT=0;
  document.getElementById('expand').classList.add('open');
  document.body.style.overflow='hidden';
}
window.closeExpand=function(){
  expandOpen=false;
  document.getElementById('expand').classList.remove('open');
  expandDrawFn=null;
  document.body.style.overflow='';
};
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&expandOpen) closeExpand();
});

/*═══════════════════════════════════════════════════
  CURSOR
═══════════════════════════════════════════════════*/
const curSvg=document.getElementById('CUR');
const curC=document.getElementById('CUR-c');
let cmx=0,cmy=0,crx=0,cry=0;
document.addEventListener('mousemove',e=>{cmx=e.clientX;cmy=e.clientY;});
(function curTick(){
  crx+=(cmx-crx)*.15; cry+=(cmy-cry)*.15;
  curSvg.style.transform=`translate(${crx-20}px,${cry-20}px)`;
  requestAnimationFrame(curTick);
})();
// grow on interactive elements
document.querySelectorAll('a,[data-index],.frame,#close-btn').forEach(el=>{
  el.addEventListener('mouseenter',()=>curC.setAttribute('r','14'));
  el.addEventListener('mouseleave',()=>curC.setAttribute('r','5'));
});

/*═══════════════════════════════════════════════════
  LOADER
═══════════════════════════════════════════════════*/
let lp2=0;
const ldf=document.getElementById('ld-fill');
const ldEl=document.getElementById('loader');
const lt=setInterval(()=>{
  lp2+=Math.random()*20;
  if(lp2>=100){lp2=100;clearInterval(lt);}
  ldf.style.width=lp2+'%';
  if(lp2>=100) setTimeout(()=>ldEl.classList.add('out'),400);
},60);

/*═══════════════════════════════════════════════════
  RESIZE
═══════════════════════════════════════════════════*/
window.addEventListener('resize',()=>ScrollTrigger.refresh());
</script>
