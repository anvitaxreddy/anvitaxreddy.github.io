  var ns=[
    {l:'M.Eng CS',r:.25,sp:.22,of:0,c:'180,90%,52%'},{l:'B.S CS',r:.25,sp:.22,of:Math.PI,c:'180,90%,52%'},
    {l:'LangGraph',r:.38,sp:.16,of:0,c:'15,90%,52%'},{l:'FastAPI',r:.38,sp:.16,of:2.2,c:'15,90%,52%'},{l:'Azure OpenAI',r:.38,sp:.16,of:4.4,c:'15,90%,52%'},
    {l:'React',r:.51,sp:.09,of:0,c:'275,80%,60%'},{l:'Python',r:.51,sp:.09,of:1.6,c:'275,80%,60%'},{l:'Docker',r:.51,sp:.09,of:3.1,c:'275,80%,60%'},{l:'AWS',r:.51,sp:.09,of:4.7,c:'275,80%,60%'}
  ];
  ctx.font=Math.floor(w*.015)+'px Martian Mono,monospace';
  ns.forEach(function(n){
    var a=t*n.sp*.01+n.of,nx=cx+Math.cos(a)*n.r*R,ny=cy+Math.sin(a)*n.r*R;
    ctx.strokeStyle='hsla('+n.c+',.09)';ctx.lineWidth=.6;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(nx,ny);ctx.stroke();
    ctx.beginPath();ctx.arc(nx,ny,3.5,0,Math.PI*2);ctx.fillStyle='hsla('+n.c+',.88)';ctx.fill();
    ctx.textAlign='center';ctx.fillStyle='hsla('+n.c+',.6)';ctx.fillText(n.l,nx,ny-9);
  });
  var p=Math.sin(t*.033)*.22+.75;
  var rg=ctx.createRadialGradient(cx,cy,0,cx,cy,52);
  rg.addColorStop(0,'rgba(28,240,192,'+(p*.32)+')');rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg;ctx.beginPath();ctx.arc(cx,cy,52,0,Math.PI*2);ctx.fill();
  ctx.textAlign='center';
  ctx.font='bold '+Math.floor(w*.04)+'px Bebas Neue,sans-serif';
  ctx.fillStyle='rgba(242,240,235,.88)';ctx.fillText('ANVITA',cx,cy+8);
  ctx.font=Math.floor(w*.014)+'px Martian Mono,monospace';
  ctx.fillStyle='rgba(28,240,192,.5)';ctx.fillText('AI ENGINEER',cx,cy+26);
  ctx.textAlign='left';
}

function drawPG(ctx,w,h,t){
  ctx.fillStyle='#0a0507';ctx.fillRect(0,0,w,h);
  var stages=['INPUT\nDATA','FAISS\nINDEX','LangGraph\nAGENTS','GPT-4\nINFER','StatVisor\nOUT'];
  var N=stages.length,pad=w*.09,sw=(w-pad*2)/(N-1),cy=h/2;
  stages.forEach(function(s,i){
    var x=pad+i*sw,bw=Math.floor(w*.12),bh=Math.floor(h*.19);
    var a=.1+Math.sin(t*.04+i*.8)*.06;
    ctx.fillStyle='rgba(232,73,15,'+a+')';ctx.fillRect(x-bw/2,cy-bh/2,bw,bh);
    ctx.strokeStyle='rgba(232,73,15,'+(a*3)+')';ctx.lineWidth=1;ctx.strokeRect(x-bw/2,cy-bh/2,bw,bh);
    ctx.textAlign='center';ctx.font=Math.floor(w*.015)+'px Martian Mono,monospace';ctx.fillStyle='rgba(242,240,235,.78)';
    s.split('\n').forEach(function(l,li){ctx.fillText(l,x,cy-6+li*Math.floor(h*.04));});
    if(i<N-1){
      var nx=pad+(i+1)*sw,pr=((t*.024+i*.28)%1),px=x+bw/2+(nx-bw/2-(x+bw/2))*pr;
      ctx.strokeStyle='rgba(242,240,235,.04)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+bw/2,cy);ctx.lineTo(nx-bw/2,cy);ctx.stroke();
      ctx.beginPath();ctx.arc(px,cy,3.5,0,Math.PI*2);ctx.fillStyle='rgba(232,73,15,.88)';ctx.fill();
    }
  });
  ctx.textAlign='left';
  var ms=[{t:'70% FASTER',x:.04,y:.14},{t:'3,000+ PAGES',x:.72,y:.18},{t:'95%+ ACCURACY',x:.06,y:.84},{t:'<1s LATENCY',x:.64,y:.84},{t:'15+ METRICS',x:.04,y:.5}];
  ctx.font=Math.floor(w*.013)+'px Martian Mono,monospace';
  ms.forEach(function(m){ctx.fillStyle='rgba(240,192,64,'+(0.18+Math.sin(t*.03+m.x*8)*.1)+')';ctx.fillText(m.t,w*m.x,h*m.y);});
}

var AQ_NODES=null;
function drawAQ(ctx,w,h,t){
  ctx.fillStyle='#060a10';ctx.fillRect(0,0,w,h);
  if(!AQ_NODES){AQ_NODES=[];for(var i=0;i<22;i++)AQ_NODES.push({x:.1+Math.random()*.8,y:.1+Math.random()*.8,vx:(Math.random()-.5)*.00028,vy:(Math.random()-.5)*.00028});}
  AQ_NODES.forEach(function(n){n.x+=n.vx;n.y+=n.vy;if(n.x<.04||n.x>.96)n.vx*=-1;if(n.y<.04||n.y>.96)n.vy*=-1;});
  for(var i=0;i<AQ_NODES.length;i++)for(var j=i+1;j<AQ_NODES.length;j++){
    var dx=(AQ_NODES[i].x-AQ_NODES[j].x)*w,dy=(AQ_NODES[i].y-AQ_NODES[j].y)*h,d=Math.sqrt(dx*dx+dy*dy);
    if(d<w*.19){ctx.strokeStyle='rgba(28,192,240,'+(0.045*(1-d/(w*.19)))+')';ctx.lineWidth=.55;ctx.beginPath();ctx.moveTo(AQ_NODES[i].x*w,AQ_NODES[i].y*h);ctx.lineTo(AQ_NODES[j].x*w,AQ_NODES[j].y*h);ctx.stroke();}
  }
  AQ_NODES.forEach(function(n,i){
    var p=Math.sin(t*.05+i*.7)*.5+.5;ctx.beginPath();ctx.arc(n.x*w,n.y*h,2.2+p*1.8,0,Math.PI*2);
    ctx.fillStyle=i===0?'rgba(240,192,64,.88)':'rgba(28,192,240,'+(0.38+p*.38)+')';ctx.fill();
  });
  var cnt=Math.floor(((t*0.38)%11000)+1);
  ctx.textAlign='center';ctx.font='bold '+Math.floor(w*.068)+'px Bebas Neue,sans-serif';
  ctx.fillStyle='rgba(240,192,64,.12)';ctx.fillText(cnt.toLocaleString()+'+ SITES',w/2,.56*h);
  ctx.font=Math.floor(w*.015)+'px Martian Mono,monospace';
  ctx.fillStyle='rgba(28,192,240,.42)';ctx.fillText('SCRAPED & PROCESSED',w/2,.66*h);
  ctx.textAlign='left';
}

function drawProj(ctx,w,h,t){
  ctx.fillStyle='#06080f';ctx.fillRect(0,0,w,h);
  var mid=w/2,ua=.52+Math.sin(t*.04)*.11;
  ctx.strokeStyle='rgba(155,93,229,.26)';ctx.lineWidth=1;ctx.strokeRect(16,32,mid-26,h-64);
  ctx.fillStyle='rgba(155,93,229,'+(ua*.32)+')';ctx.fillRect(24,40,mid-42,Math.floor(h*.055));
  ctx.font=Math.floor(w*.016)+'px Martian Mono,monospace';ctx.fillStyle='rgba(242,240,235,'+(ua*.82)+')';ctx.fillText('MOCKVIEW',32,40+Math.floor(h*.036));
  var mx=mid*.5,my=h*.5,mp=Math.sin(t*.07)*.5+.5;
  ctx.beginPath();ctx.arc(mx,my,Math.floor(w*.036),0,Math.PI*2);ctx.strokeStyle='rgba(155,93,229,'+ua+')';ctx.lineWidth=2;ctx.stroke();
  var mrg=ctx.createRadialGradient(mx,my,0,mx,my,Math.floor(w*.062)*mp);
  mrg.addColorStop(0,'rgba(155,93,229,'+(mp*.2)+')');mrg.addColorStop(1,'transparent');
  ctx.fillStyle=mrg;ctx.beginPath();ctx.arc(mx,my,Math.floor(w*.062)*mp,0,Math.PI*2);ctx.fill();
  ctx.beginPath();for(var px=24;px<mid-18;px++){var wy=h*.71+Math.sin(px*.09+t*.1)*Math.floor(h*.036)*mp;px===24?ctx.moveTo(px,wy):ctx.lineTo(px,wy);}
  ctx.strokeStyle='rgba(155,93,229,'+(ua*.62)+')';ctx.lineWidth=1.4;ctx.stroke();
  var lb=Math.sin(t*.05)*.28+.72;ctx.beginPath();ctx.arc(mid-24,48,4,0,Math.PI*2);ctx.fillStyle='rgba(74,222,128,'+lb+')';ctx.fill();
  ctx.font=Math.floor(w*.011)+'px Martian Mono,monospace';ctx.fillStyle='rgba(74,222,128,.65)';ctx.fillText('LIVE',mid-17,52);
  ctx.strokeStyle='rgba(242,240,235,.055)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(mid,32);ctx.lineTo(mid,h-32);ctx.stroke();
  ctx.strokeStyle='rgba(28,240,192,.2)';ctx.lineWidth=1;ctx.strokeRect(mid+9,32,w-mid-26,h-64);
  ctx.font=Math.floor(w*.015)+'px Martian Mono,monospace';ctx.fillStyle='rgba(28,240,192,.62)';ctx.fillText('NEUROCACHE',mid+18,58);
  var bars=8,bw2=Math.floor((w-mid-48)/bars);
  for(var b=0;b<bars;b++){
    var bx=mid+18+b*bw2,bh=Math.floor(h*.32)*(0.22+Math.sin(t*.03+b)*.5+.5),ba=.07+Math.sin(t*.04+b*.7)*.055;
    ctx.fillStyle='rgba(28,240,192,'+ba+')';ctx.fillRect(bx,h*.33+Math.floor(h*.32)-bh,bw2-4,bh);
  }
  ctx.textAlign='center';ctx.font=Math.floor(w*.012)+'px Martian Mono,monospace';ctx.fillStyle='rgba(28,240,192,.35)';
  ctx.fillText('500+ EVAL RUNS',mid+(w-mid)/2,h*.86);ctx.textAlign='left';
}

function drawSkills(ctx,w,h,t){
  ctx.fillStyle='#060810';ctx.fillRect(0,0,w,h);
  var cx=w/2,cy=h/2;
  var cats=[
    {n:'GENAI',s:['LangGraph','RAG','FAISS','MCP'],c:'180,90%,50%',a:Math.PI*.25},
    {n:'BACKEND',s:['FastAPI','Asyncio','Python','Kafka'],c:'15,90%,50%',a:Math.PI*.75},
    {n:'CLOUD',s:['Azure','AWS','GCP','Docker'],c:'275,80%,60%',a:Math.PI*1.25},
    {n:'ML/DATA',s:['PyTorch','TensorFlow','MLflow'],c:'45,95%,50%',a:Math.PI*1.75}
  ];
  var R=Math.min(w,h)*.32;
  cats.forEach(function(cat){
    var ba=cat.a+t*.0028,nx=cx+Math.cos(ba)*R*1.08,ny=cy+Math.sin(ba)*R*1.08;
    var rg=ctx.createRadialGradient(nx,ny,0,nx,ny,R*.46);
    rg.addColorStop(0,'hsla('+cat.c+',.12)');rg.addColorStop(1,'transparent');
    ctx.fillStyle=rg;ctx.beginPath();ctx.arc(nx,ny,R*.46,0,Math.PI*2);ctx.fill();
    ctx.textAlign='center';ctx.font='bold '+Math.floor(w*.02)+'px Bebas Neue,sans-serif';
    ctx.fillStyle='hsla('+cat.c+',.85)';ctx.fillText(cat.n,nx,ny-R*.09);
    ctx.font=Math.floor(w*.012)+'px Martian Mono,monospace';
    cat.s.forEach(function(sk,si){ctx.fillStyle='hsla('+cat.c+',.45)';ctx.fillText(sk,nx,ny+si*Math.floor(h*.04)-R*.01);});
  });
  ctx.textAlign='center';ctx.font='bold '+Math.floor(w*.031)+'px Bebas Neue,sans-serif';
  ctx.fillStyle='rgba(242,240,235,.06)';ctx.fillText('FULL STACK AI',cx,cy+9);ctx.textAlign='left';
}

function drawCerts(ctx,w,h,t){
  ctx.fillStyle='#0a0800';ctx.fillRect(0,0,w,h);
  var certs=['ANTHROPIC','AWS','NVIDIA','DATABRICKS','IBM','SNOWFLAKE'];
  certs.forEach(function(c,i){
    var col=i%3,row=Math.floor(i/3),cx2=col*(w/3)+w/6,cy2=row*(h/2)+h/4;
    var p=Math.sin(t*.04+i*.9)*.5+.5,r=Math.min(w/3,h/2)*.28;
    ctx.beginPath();
    for(var pt=0;pt<6;pt++){var ag=pt*Math.PI/3-Math.PI/6;pt===0?ctx.moveTo(cx2+Math.cos(ag)*r,cy2+Math.sin(ag)*r):ctx.lineTo(cx2+Math.cos(ag)*r,cy2+Math.sin(ag)*r);}
    ctx.closePath();ctx.strokeStyle='rgba(240,192,64,'+(0.2+p*.13)+')';ctx.lineWidth=1.4;ctx.stroke();
    ctx.fillStyle='rgba(240,192,64,'+(0.035+p*.028)+')';ctx.fill();
    ctx.textAlign='center';ctx.font=Math.floor(Math.min(w/3,h/2)*.12)+'px serif';
    ctx.fillStyle='rgba(240,192,64,'+(0.52+p*.28)+')';ctx.fillText('★',cx2,cy2+Math.floor(Math.min(w/3,h/2)*.04));
    ctx.font=Math.floor(w*.015)+'px Martian Mono,monospace';
    ctx.fillStyle='rgba(242,240,235,'+(0.42+p*.28)+')';ctx.fillText(c,cx2,cy2+Math.floor(Math.min(w/3,h/2)*.17));ctx.textAlign='left';
  });
  ctx.textAlign='center';ctx.font='bold '+Math.floor(w*.1)+'px Bebas Neue,sans-serif';
  ctx.fillStyle='rgba(240,192,64,.025)';ctx.fillText('2025',w/2,h*.56);ctx.textAlign='left';
}

/* ---- FRAME CONFIG ---- */
var FRAMES=[
  {n:'00',l:'INTRO',     m:'ANVITA',         s:'AI Engineer &middot; GenAI Architect',    expKey:null,      draw:drawIntro},
  {n:'01',l:'IDENTITY',  m:'ABOUT',           s:'Engineer &middot; Researcher &middot; Builder', expKey:'about',  draw:drawAbout},
  {n:'02',l:'WORK',      m:'P&amp;G',         s:'Software Developer / AI-ML Researcher',  expKey:'pg',      draw:drawPG},
  {n:'03',l:'WORK',      m:'ANALYTICSQUAD4',  s:'Software Engineer &mdash; May 2023&ndash;Jul 2024', expKey:'aq', draw:drawAQ},
  {n:'04',l:'PROJECTS',  m:'BUILT',           s:'Mockview &middot; NeuroCache &middot; More', expKey:'proj', draw:drawProj},
  {n:'05',l:'SKILLS',    m:'ARSENAL',         s:'Languages &middot; GenAI &middot; Cloud &middot; ML', expKey:'skills', draw:drawSkills},
  {n:'06',l:'CREDS',     m:'CERTIFIED',       s:'6 Certifications &middot; 2025',          expKey:'certs',   draw:drawCerts}
];

/* ---- BUILD DOM ---- */
var VW=window.innerWidth, VH=window.innerHeight;
var FW=Math.round(VW*0.78), N=FRAMES.length;
var offset=Math.round((VW-FW)/2);

// sprocket holes
['st','sb'].forEach(function(id){
  var el=document.getElementById(id),count=Math.ceil(VW*N/12)+20;
  for(var i=0;i<count;i++){var h=document.createElement('div');h.className='hole';el.appendChild(h);}
});

var tape=document.getElementById('tape');
tape.style.paddingLeft=offset+'px';
tape.style.paddingRight=offset+'px';

var CVS=[];
FRAMES.forEach(function(fr,i){
  var frame=document.createElement('div');
  frame.className='frame';frame.style.width=FW+'px';
  var cv=document.createElement('canvas');
  cv.width=FW;cv.height=VH-48;
  frame.appendChild(cv);
  var lbl=document.createElement('div');lbl.className='fidx';lbl.textContent=String(i+1).padStart(3,'0');
  frame.appendChild(lbl);
  tape.appendChild(frame);
  CVS.push({cv:cv,ctx:cv.getContext('2d'),fr:fr,t:0});
  if(fr.expKey){
    frame.style.cursor='none';
    frame.addEventListener('click',function(){openExp(fr);});
  }
});

/* ---- SCROLL ---- */
var totalTravel=(N-1)*FW, curFr=0;

ScrollTrigger.create({
  trigger:'#track',start:'top top',end:'bottom bottom',scrub:1,
  onUpdate:function(self){
    gsap.set(tape,{x:-self.progress*totalTravel});
    document.getElementById('pbar').style.width=(self.progress*100)+'%';
    var idx=Math.min(N-1,Math.max(0,Math.round(self.progress*(N-1))));
    if(idx!==curFr){
      curFr=idx;var f=FRAMES[idx];
      document.getElementById('ln').innerHTML=f.n+' &mdash; '+f.l;
      document.getElementById('lm').innerHTML=f.m;
      document.getElementById('ls').innerHTML=f.s;
      document.getElementById('hfn').textContent=String(idx+1).padStart(3,'0');
      document.getElementById('hex').classList.toggle('show',!!f.expKey);
    }
    if(self.progress>.02)document.getElementById('shi').classList.add('gone');
    else document.getElementById('shi').classList.remove('gone');
  }
});

/* ---- ANIM LOOP ---- */
var exDrawFn=null,exT=0,exCtx=null;
function loop(){
  CVS.forEach(function(c,i){
    if(Math.abs(i-curFr)<=2){c.t++;c.fr.draw(c.ctx,c.cv.width,c.cv.height,c.t);}
  });
  var expEl=document.getElementById('exp');
  if(exDrawFn&&expEl.classList.contains('open')){
    exT++;var ec=document.getElementById('excv');
    exDrawFn(exCtx,ec.width,ec.height,exT);
  }
  requestAnimationFrame(loop);
}
loop();

/* ---- EXPAND ---- */
function openExp(fr){
  var d=EXP[fr.expKey];if(!d)return;
  document.getElementById('etag').innerHTML=d.tag;
  document.getElementById('etit').innerHTML=d.tit;
  document.getElementById('ebody').innerHTML=d.html;
  var ec=document.getElementById('excv');
  ec.width=document.getElementById('exl').offsetWidth||Math.round(VW*.44);
  ec.height=VH;
  exCtx=ec.getContext('2d');exDrawFn=fr.draw;exT=0;
  document.getElementById('exp').classList.add('open');
}
window.closeExp=function(){document.getElementById('exp').classList.remove('open');exDrawFn=null;};
document.addEventListener('keydown',function(e){if(e.key==='Escape')window.closeExp();});

/* ---- CURSOR ---- */
var cs=document.getElementById('CUR'),cc=document.getElementById('CURc');
var cmx=0,cmy=0,crx=0,cry=0;
document.addEventListener('mousemove',function(e){cmx=e.clientX;cmy=e.clientY;});
(function ct(){crx+=(cmx-crx)*.14;cry+=(cmy-cry)*.14;cs.style.transform='translate('+(crx-22)+'px,'+(cry-22)+'px)';requestAnimationFrame(ct);})();
document.querySelectorAll('a,.frame,#cbtn').forEach(function(el){
  el.addEventListener('mouseenter',function(){cc.setAttribute('r','13');});
  el.addEventListener('mouseleave',function(){cc.setAttribute('r','5');});
});

/* ---- LOADER ---- */
var lp=0,lf=document.getElementById('lf'),ld=document.getElementById('ldr');
var lt=setInterval(function(){lp+=Math.random()*22;if(lp>=100){lp=100;clearInterval(lt);}lf.style.width=lp+'%';if(lp>=100)setTimeout(function(){ld.classList.add('out');},350);},55);

window.addEventListener('resize',function(){ScrollTrigger.refresh();});
</script>
</body>
